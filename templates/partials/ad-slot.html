{# AdSense 광고 슬롯 — 기본 비활성.
   활성화하려면 아래 <ins> 블록의 주석을 해제하고
   data-ad-client / data-ad-slot 값을 실제 값으로 채운다.
   (헤더의 AdSense 로더 스크립트도 함께 활성화해야 한다.) #}
<!--
<div class="ad-slot">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="XXXXXXXXXX"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>
